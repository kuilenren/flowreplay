<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>FlowReplay demo</title></head>
<body>
  <h1>Demo search</h1>
  <!-- role=textbox, accessible name "Search" (via aria-label) -->
  <input id="q" name="q" aria-label="Search" placeholder="Search stories…" />
  <!-- role=button, accessible name "Search" -->
  <button id="go">Search</button>
  <div id="out"></div>
  <script>
    document.getElementById('go').addEventListener('click', function () {
      var v = document.getElementById('q').value;
      document.getElementById('out').textContent = 'Results for ' + v;
    });
  </script>
</body>
</html>
